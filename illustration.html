  <div class="illust-modal" hidden>
    <div class="illust-modal-backdrop"></div>
    <div class="illust-modal-dialog" role="dialog" aria-modal="true" aria-label="Illustration preview">
      <button class="illust-modal-close" type="button" aria-label="Close preview">×</button>
      <img class="illust-modal-image" src="" alt="">
    </div>
  </div>

  <script>
    const modal = document.querySelector(".illust-modal");
    const modalImage = document.querySelector(".illust-modal-image");
    const modalClose = document.querySelector(".illust-modal-close");
    const modalBackdrop = document.querySelector(".illust-modal-backdrop");
    const thumbButtons = document.querySelectorAll(".illust-thumb");

    function openModal(image) {
      modalImage.src = image.src;
      modalImage.alt = image.alt;
      modal.hidden = false;
      document.body.classList.add("modal-open");
    }

    function closeModal() {
      modal.hidden = true;
      modalImage.src = "";
      modalImage.alt = "";
      document.body.classList.remove("modal-open");
    }

    thumbButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const image = button.querySelector("img");
        openModal(image);
      });
    });

    modalClose.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", closeModal);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !modal.hidden) {
        closeModal();
      }
    });
  </script>
